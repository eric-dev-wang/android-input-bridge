name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify version rules
        run: ./gradlew --no-configuration-cache verifyBridgeVersion

      - name: Run verification matrix
        run: >-
          ./gradlew
          :app:lintDebug
          :app:testDebugUnitTest
          :protocol:test
          :android-studio-plugin:test
          :android-studio-plugin:buildPlugin
          :android-studio-plugin:verifyPlugin
